<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Beat Catalog</title>

<style>

body{
background:#0e0e0e;
color:white;
font-family:Arial;
margin:0;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
}

.player{
margin-bottom:30px;
}

.track{
padding:15px;
border-bottom:1px solid #333;
cursor:pointer;
}

.track:hover{
background:#1a1a1a;
}

.meta{
color:#888;
font-size:13px;
}

h1{
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎧 Beat Catalog</h1>

<div class="player">

<audio id="audioPlayer" controls style="width:100%">
<source id="audioSource" src="beats/beat1.mp3" type="audio/mpeg">
</audio>

<h2 id="title">Dark Drill Beat</h2>
<p class="meta" id="meta">140 BPM • C Minor • Drill</p>

</div>

<div class="track"
onclick="playBeat('beats/beat1.mp3','Dark Drill Beat','140 BPM • C Minor • Drill')">

<strong>Dark Drill Beat</strong>
<div class="meta">140 BPM • C Minor • Drill</div>

</div>

<div class="track"
onclick="playBeat('beats/beat2.mp3','Boom Bap Classic','92 BPM • G Minor • Boom Bap')">

<strong>Boom Bap Classic</strong>
<div class="meta">92 BPM • G Minor • Boom Bap</div>

</div>

<div class="track"
onclick="playBeat('beats/beat3.mp3','Trap Night','150 BPM • D# Minor • Trap')">

<strong>Trap Night</strong>
<div class="meta">150 BPM • D# Minor • Trap</div>

</div>

</div>

<script>

function playBeat(src,title,meta){

const player = document.getElementById("audioPlayer")
const source = document.getElementById("audioSource")

source.src = src

player.load()
player.play()

document.getElementById("title").innerText = title
document.getElementById("meta").innerText = meta

}

</script>

</body>
</html>
