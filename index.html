<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Catalog</title>

<link rel="stylesheet" href="style.css">

</head>

<body oncontextmenu="return false;">

<div class="container">

<h1>Beats Disponibles</h1>
<h2>PpekadorR En El Beat</h2>

<input type="text" id="search" placeholder="Buscar beats...">

<div id="tracklist" class="tracklist"></div>

</div>

<!-- PLAYER FIJO -->
<div class="player-fixed">

<div class="info">
<h3 id="title">---</h3>
<p id="meta">---</p>
</div>

<div class="controls">

<button id="prev">⏮</button>
<button id="play">▶</button>
<button id="next">⏭</button>

</div>

<input type="range" id="progress" value="0">
<div class="time">
<span id="current">0:00</span> / <span id="duration">0:00</span>
</div>

<input type="range" id="volume" min="0" max="1" step="0.01">

<audio id="audio"></audio>

</div>

<script src="script.js"></script>

</body>
</html>
