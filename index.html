<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Beat Catalog</title>

<link rel="stylesheet" href="style.css">

</head>

<body oncontextmenu="return false;">

<div class="container">

<h1>🎧 Beat Catalog</h1>

<div class="player">

<h2 id="title">Selecciona un beat</h2>
<p id="meta">BPM • KEY • TYPE</p>

<audio id="audio" controls controlsList="nodownload"></audio>

<div class="time">
<span id="current">0:00</span> / <span id="duration">0:00</span>
</div>

</div>

<div class="tracklist">

<div class="track active"
data-src="beats/beat1.mp3"
data-title="Dark Drill Beat"
data-meta="140 BPM • C Minor • Drill">

▶ Dark Drill Beat
<span>140 BPM • C Minor • Drill</span>

</div>

<div class="track"
data-src="beats/beat2.mp3"
data-title="Boom Bap Classic"
data-meta="92 BPM • G Minor • Boom Bap">

▶ Boom Bap Classic
<span>92 BPM • G Minor • Boom Bap</span>

</div>

<div class="track"
data-src="beats/beat3.mp3"
data-title="Trap Night"
data-meta="150 BPM • D# Minor • Trap">

▶ Trap Night
<span>150 BPM • D# Minor • Trap</span>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
